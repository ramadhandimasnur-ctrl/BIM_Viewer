<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project2 IFC Viewer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
}

#viewer {
    width: 100%;
    height: 100vh;
}
</style>

</head>

<body>

<div id="viewer"></div>

<script type="module">

import * as OBC from "https://cdn.jsdelivr.net/npm/@thatopen/components/+esm";


const container = document.getElementById("viewer");

const components = new OBC.Components();

const worlds = components.get(OBC.Worlds);

const world = worlds.create(
    OBC.SimpleScene,
    OBC.OrthoPerspectiveCamera,
    OBC.SimpleRenderer
);

world.renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

container.appendChild(
    world.renderer.domElement
);

world.scene = new OBC.SimpleScene(components);
world.camera = new OBC.OrthoPerspectiveCamera(components);
world.renderer = new OBC.SimpleRenderer(
    components,
    container
);

components.init();

world.scene.three.background = 
new THREE.Color(0xffffff);


// Load IFC

const ifcLoader = components.get(
    OBC.IfcLoader
);

await ifcLoader.setup();

const model = await ifcLoader.load(
    "./Project2%20f%27c%2035_detached.ifc"
);

world.scene.three.add(model);

world.camera.fitToSphere(
    model,
    true
);

</script>

</body>
</html>
