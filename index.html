<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>IFC 3D Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script type="module">
        import * as OBC from 'https://cdn.jsdelivr.net/npm/@thatopen/components@0.8.0/+esm';

        const container = document.getElementById("viewer");
        const components = new OBC.Components();
        const worlds = components.get(OBC.Worlds);
        const world = worlds.create();
        
        world.scene = new OBC.SimpleScene(components);
        world.renderer = new OBC.SimpleRenderer(components, container);
        world.camera = new OBC.SimpleCamera(components);
        
        components.init();
        world.camera.controls.setLookAt(10, 10, 10, 0, 0, 0);
        world.scene.setup();

        const fragments = components.get(OBC.FragmentsManager);
        const fileFetcher = components.get(OBC.IfcJsonExporter); // Hanya contoh inisialisasi

        async function loadIfc() {
            // Menggunakan encodeURIComponent untuk menangani spasi dan karakter khusus di nama file
            const url = encodeURIComponent("Project2 f'c 35_detached.ifc");
            const response = await fetch(url);
            const data = await response.arrayBuffer();
            const buffer = new Uint8Array(data);
            
            const model = await fragments.load(buffer);
            console.log("Model berhasil dimuat:", model);
        }

        loadIfc();
    </script>
</body>
</html>
