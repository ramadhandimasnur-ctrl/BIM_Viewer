<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>IFC Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script type="module">
        // Menggunakan library ThatOpen yang lebih umum
        import * as OBC from 'https://cdn.jsdelivr.net/npm/@thatopen/components@0.8.0/+esm';

        const container = document.getElementById("viewer");
        const components = new OBC.Components();
        
        const worlds = components.get(OBC.Worlds);
        const world = worlds.create();
        
        world.scene = new OBC.SimpleScene(components);
        world.renderer = new OBC.SimpleRenderer(components, container);
        world.camera = new OBC.SimpleCamera(components);
        
        components.init();
        world.camera.controls.setLookAt(10, 10, 10, 0, 0, 0);
        world.scene.setup();

        const fragments = components.get(OBC.FragmentsManager);

        async function loadIfc() {
            try {
                // Nama file harus sama persis dengan yang ada di GitHub
                const fileName = "Project2 f'c 35_detached.ifc";
                const response = await fetch(fileName);
                
                if (!response.ok) throw new Error("Gagal mengambil file IFC");
                
                const data = await response.arrayBuffer();
                const buffer = new Uint8Array(data);
                
                await fragments.load(buffer);
                console.log("Model berhasil dimuat!");
            } catch (err) {
                console.error("Error saat load model:", err);
            }
        }

        loadIfc();
    </script>
</body>
</html>
